<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bigfoot Sightings Over Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      background: #000;
    }
    #chart-wrap { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

    /* ── Line & area ── */
    .vz-line  { stroke: #FDAE61; stroke-width: 2.5; fill: none; }

    /* ── Axes ── */
    .vz-axis text {
      font-size: 15px; font-weight: 700;
      fill: #ffffff; opacity: 1;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-axis .domain    { stroke: #ffffff; opacity: 0.7; }
    .vz-axis .tick line { stroke: #ffffff; opacity: 0.5; }
    .vz-grid line       { stroke: #ffffff; stroke-opacity: 0.07; }
    .vz-grid .domain    { display: none; }

    /* ── Titles / labels ── */
    .vz-chart-title {
      font-size: 20px; font-weight: 700; fill: #FDAE61;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-subtitle {
      font-size: 13px; fill: #ffffff; opacity: 0.8;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-axis-label {
      font-size: 16px; font-weight: 700; fill: #ffffff; opacity: 1;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Event markers ── */
    .event-line { stroke: #D7EAF7; stroke-width: 1; stroke-dasharray: 4,5; opacity: 0.18; }
    .event-dot  {
      fill: #000; stroke: #D7EAF7; stroke-width: 1.5;
      cursor: pointer; transition: r 0.1s, stroke 0.1s;
    }

    /* ── Hover helpers ── */
    .hover-line { stroke: #D7EAF7; stroke-width: 1; opacity: 0.35; pointer-events: none; }
    .hover-dot  { fill: #FDAE61; stroke: #000; stroke-width: 2; pointer-events: none; }

    /* ── Brush ── */
    .brush .selection { fill: #D7EAF7; fill-opacity: 0.12; stroke: #D7EAF7; stroke-width: 1; }
    .brush .handle    { fill: #D7EAF7; opacity: 0.5; }
    .brush .overlay   { cursor: crosshair; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.95);
      border: 1px solid rgba(215,234,247,0.35);
      color: #D7EAF7;
      padding: 12px 15px;
      border-radius: 3px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px; line-height: 1.6;
      width: 300px;
      word-wrap: break-word;
      white-space: normal;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 200;
      pointer-events: none;   /* hover tip: no pointer events */
    }
    /* pinned (click) tip stays open and is non-interactive (user just reads it) */
    #tooltip.pinned {
      pointer-events: none;
      border-color: rgba(253,174,97,0.5);
    }
    #tooltip .tt-label { display: block; color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    #tooltip .tt-meta  { color: #FDAE61; font-size: 12px; }
    #tooltip .tt-hint  { color: #ffffff; opacity: 0.75; font-size: 12px; margin-top: 6px; }
    #tooltip .tt-desc  {
      color: #D7EAF7; font-size: 12px; line-height: 1.7;
      margin-top: 9px;
      padding-top: 8px;
      border-top: 1px solid rgba(215,234,247,0.2);
      word-wrap: break-word;
      white-space: normal;
    }

    /* ── Floating UI buttons ── */
    #ui-buttons {
      position: fixed;
      top: 14px; right: 16px;
      display: flex; gap: 8px;
      z-index: 300;
    }
    .ui-btn {
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(215,234,247,0.35);
      color: #D7EAF7;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      border-radius: 2px;
      transition: border-color 0.1s, color 0.1s;
      display: none;
    }
    .ui-btn.visible { display: inline-block; }
    .ui-btn.active  { border-color: #FDAE61; color: #FDAE61; }
    .ui-btn:hover   { border-color: #FDAE61; color: #FDAE61; }

    /* Zoom-mode cursor hint */
    body.zoom-mode #chart-wrap { cursor: crosshair; }
  </style>
</head>
<body>
<div id="chart-wrap"></div>
<div id="tooltip"></div>
<div id="ui-buttons">
  <button class="ui-btn visible" id="btn-zoom">[ select to zoom ]</button>
  <button class="ui-btn" id="btn-reset">[ reset zoom ]</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
// ─────────────────────────────────────────────
// DATA  (1910–2014)
// ─────────────────────────────────────────────
const RAW = [{"year":1921,"sightings":1},{"year":1922,"sightings":0},{"year":1923,"sightings":0},{"year":1924,"sightings":0},{"year":1925,"sightings":1},{"year":1926,"sightings":0},{"year":1927,"sightings":0},{"year":1928,"sightings":0},{"year":1929,"sightings":0},{"year":1930,"sightings":1},{"year":1931,"sightings":0},{"year":1932,"sightings":0},{"year":1933,"sightings":0},{"year":1934,"sightings":0},{"year":1935,"sightings":0},{"year":1936,"sightings":0},{"year":1937,"sightings":0},{"year":1938,"sightings":1},{"year":1939,"sightings":0},{"year":1940,"sightings":0},{"year":1941,"sightings":1},{"year":1942,"sightings":1},{"year":1943,"sightings":0},{"year":1944,"sightings":2},{"year":1945,"sightings":0},{"year":1946,"sightings":0},{"year":1947,"sightings":1},{"year":1948,"sightings":1},{"year":1949,"sightings":2},{"year":1950,"sightings":3},{"year":1951,"sightings":0},{"year":1952,"sightings":1},{"year":1953,"sightings":3},{"year":1954,"sightings":1},{"year":1955,"sightings":3},{"year":1956,"sightings":4},{"year":1957,"sightings":4},{"year":1958,"sightings":5},{"year":1959,"sightings":1},{"year":1960,"sightings":5},{"year":1961,"sightings":9},{"year":1962,"sightings":5},{"year":1963,"sightings":10},{"year":1964,"sightings":8},{"year":1965,"sightings":8},{"year":1966,"sightings":6},{"year":1967,"sightings":12},{"year":1968,"sightings":12},{"year":1969,"sightings":18},{"year":1970,"sightings":19},{"year":1971,"sightings":12},{"year":1972,"sightings":21},{"year":1973,"sightings":29},{"year":1974,"sightings":35},{"year":1975,"sightings":43},{"year":1976,"sightings":37},{"year":1977,"sightings":61},{"year":1978,"sightings":74},{"year":1979,"sightings":40},{"year":1980,"sightings":65},{"year":1981,"sightings":39},{"year":1982,"sightings":46},{"year":1983,"sightings":41},{"year":1984,"sightings":35},{"year":1985,"sightings":25},{"year":1986,"sightings":45},{"year":1987,"sightings":32},{"year":1988,"sightings":32},{"year":1989,"sightings":31},{"year":1990,"sightings":38},{"year":1991,"sightings":39},{"year":1992,"sightings":28},{"year":1993,"sightings":40},{"year":1994,"sightings":58},{"year":1995,"sightings":44},{"year":1996,"sightings":41},{"year":1997,"sightings":72},{"year":1998,"sightings":74},{"year":1999,"sightings":63},{"year":2000,"sightings":139},{"year":2001,"sightings":123},{"year":2002,"sightings":101},{"year":2003,"sightings":146},{"year":2004,"sightings":230},{"year":2005,"sightings":205},{"year":2006,"sightings":171},{"year":2007,"sightings":141},{"year":2008,"sightings":138},{"year":2009,"sightings":119},{"year":2010,"sightings":97},{"year":2011,"sightings":119},{"year":2012,"sightings":139},{"year":2013,"sightings":119},{"year":2014,"sightings":98}];

const earlyYears = [];
for (let y = 1910; y <= 1920; y++) earlyYears.push({ year: y, sightings: 0 });
const DATA = [...earlyYears, ...RAW];

const FULL_DOMAIN = [1910, 2014];

// ─────────────────────────────────────────────
// CONTEXTUAL EVENTS
// ─────────────────────────────────────────────
const EVENTS = [
  { year: 1924, label: "Ape Canyon Incident",
    desc: "One of the first nationally publicized 'ape-man' stories in the U.S. Miners near Mount St. Helens, WA reported being attacked overnight by large ape-like creatures hurling boulders, drawing national press coverage." },
  { year: 1945, label: "Post-WWII Outdoor Expansion",
    desc: "Post-World War II economic prosperity dramatically increased outdoor recreation, forest road access, and wilderness tourism across the U.S., bringing far more people into remote areas where Bigfoot sightings cluster." },
  { year: 1958, label: "Bluff Creek Footprints",
    desc: "Construction worker Jerry Crew discovered large humanoid footprints near Bluff Creek, CA. The story coined the term 'Bigfoot' in the national press and launched modern Bigfoot culture, triggering a flood of sighting reports." },
  { year: 1967, label: "Patterson-Gimlin Film",
    desc: "Roger Patterson and Bob Gimlin captured footage of an alleged Bigfoot near Bluff Creek, CA. The 59-second film became the defining visual evidence of Bigfoot and remains the most debated piece of cryptid footage ever recorded." },
  { year: 1969, label: "Environmental Movement",
    desc: "The late 1960s-70s environmental movement heightened cultural fascination with wilderness preservation and the idea of undiscovered creatures living beyond civilized reach, priming public interest in cryptids like Bigfoot." },
  { year: 1977, label: "In Search Of... Premieres",
    desc: "Leonard Nimoy's TV series 'In Search of...' mainstreamed paranormal and cryptid investigation culture on national television, featuring a widely watched Bigfoot episode that reached millions of viewers." },
  { year: 1993, label: "The X-Files Premieres",
    desc: "Fox's The X-Files popularized conspiracy thinking and unexplained phenomena in mainstream pop culture, cultivating a generation primed to engage seriously with cryptid topics including Bigfoot." },
  { year: 1994, label: "Internet Goes Mainstream",
    desc: "The World Wide Web became widely accessible to the public, enabling Bigfoot enthusiasts to share sightings, coordinate research, and build communities globally for the first time in history." },
  { year: 2001, label: "9/11 Attacks",
    desc: "The September 11 attacks deepened public distrust of government institutions and mainstream narratives, broadly fueling interest in alternative explanations and fringe topics including cryptids." },
  { year: 2004, label: "Facebook Launched",
    desc: "Facebook's launch began the social media era, enabling rapid community-building and viral sharing of Bigfoot sightings, encounter stories, photographs, and theories across global audiences." },
  { year: 2005, label: "YouTube Goes Mainstream",
    desc: "YouTube transformed Bigfoot sightings into a viral internet phenomenon through user-generated video, spawning active online communities and making it easier than ever to share alleged evidence with the world." },
  { year: 2007, label: "iPhone Launch",
    desc: "Apple's iPhone put high-quality video cameras in hundreds of millions of pockets, leading to a dramatic surge in alleged Bigfoot footage captured and submitted by ordinary citizens in wilderness areas." },
  { year: 2008, label: "Global Financial Crisis",
    desc: "The 2008 financial meltdown eroded public trust in institutions and the mainstream establishment, broadly increasing interest in alternative narratives, fringe theories, and unexplained phenomena including Bigfoot." },
  { year: 2011, label: "Finding Bigfoot Premieres",
    desc: "Animal Planet's 'Finding Bigfoot' reality TV series reintroduced Bigfoot to mainstream pop culture, drawing millions of viewers per episode and dramatically reinvigorating the frequency of sighting reports nationwide." },
];

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let zoomDomain   = null;   // null = full view
let zoomMode     = false;
let pinnedYear   = null;   // year of click-pinned event tooltip
let hoveredYear  = null;   // year currently under cursor

const tip  = document.getElementById("tooltip");
const btnZ = document.getElementById("btn-zoom");
const btnR = document.getElementById("btn-reset");

// Single source of truth for all event dot sizes/colors.
// Call this after ANY state change to pinnedYear or hoveredYear.
function syncDotStyles() {
  d3.selectAll(".event-dot")
    .attr("r", d => (pinnedYear === d.year || hoveredYear === d.year) ? 8 : 5)
    .attr("stroke", d => pinnedYear === d.year ? "#FDAE61" :
                          hoveredYear === d.year ? "#FDAE61" : "#D7EAF7");
}

// ─────────────────────────────────────────────
// TOOLTIP HELPERS
// ─────────────────────────────────────────────
function placeTipAbove(dotPageX, dotPageY) {
  const th  = tip.offsetHeight;
  const tw  = tip.offsetWidth;
  const pad = 14;
  let lx = dotPageX - tw / 2;
  let ty = dotPageY - th - pad;
  lx = Math.max(pad, Math.min(lx, window.innerWidth - tw - pad));
  if (ty < pad) ty = dotPageY + pad + 8;  // flip below near top edge
  tip.style.left = lx + "px";
  tip.style.top  = ty + "px";
}

// Plain hover tip — small, no interaction
function showHoverTip(html, dotPageX, dotPageY) {
  if (pinnedYear !== null) return;  // don't clobber a pinned tip
  tip.className = "";
  tip.innerHTML = html;
  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

// Full event tip — shown on click, stays pinned
function showPinnedTip(d, dotPageX, dotPageY) {
  pinnedYear = d.year;
  tip.className = "pinned";
  tip.innerHTML =
    `<span class="tt-label">${d.label}</span>` +
    `<span class="tt-meta">${d.year} &nbsp;·&nbsp; ${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}</span>` +
    `<div class="tt-desc">${d.desc}</div>` +
    `<div class="tt-hint">click dot or anywhere to dismiss</div>`;
  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

// Compact hover preview for event dots (no description)
function showEventHoverTip(d, dotPageX, dotPageY) {
  if (pinnedYear !== null) return;
  tip.className = "";
  tip.innerHTML =
    `<span class="tt-label">${d.label}</span>` +
    `<span class="tt-meta">${d.year} &nbsp;·&nbsp; ${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}</span>` +
    `<div class="tt-hint">click to read description</div>`;
  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

function hideTip() {
  if (pinnedYear !== null) return;  // don't hide a pinned tooltip
  tip.style.opacity = "0";
  tip.className = "";
}

function clearPin() {
  pinnedYear = null;
  tip.style.opacity = "0";
  tip.className = "";
  syncDotStyles();  // resets ALL dots to correct state in one pass
}

// Click anywhere on the document dismisses pinned tooltip
document.addEventListener("click", () => {
  if (pinnedYear !== null) clearPin();
});

// ─────────────────────────────────────────────
// ZOOM MODE
// ─────────────────────────────────────────────
function setZoomMode(on) {
  zoomMode = on;
  document.body.classList.toggle("zoom-mode", on);
  btnZ.classList.toggle("active", on);
  btnZ.textContent = on ? "[ cancel zoom ]" : "[ select to zoom ]";
  render();
}

btnZ.addEventListener("click", () => setZoomMode(!zoomMode));
btnR.addEventListener("click", () => {
  zoomDomain = null;
  expandedYear = null;
  btnR.classList.remove("visible");
  render();
});

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  d3.select("#chart-wrap").selectAll("svg").remove();
  hideTip();

  const margin = { top: 68, right: 50, bottom: 60, left: 76 };
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  const domain = zoomDomain || FULL_DOMAIN;

  const svg = d3.select("#chart-wrap").append("svg")
    .attr("width", W).attr("height", H)
    .style("background", "#000");

  // Gradient
  const defs = svg.append("defs");
  const grad = defs.append("linearGradient")
    .attr("id","area-grad").attr("x1","0").attr("y1","0").attr("x2","0").attr("y2","1");
  grad.append("stop").attr("offset","0%").attr("stop-color","#FDAE61").attr("stop-opacity", 0.38);
  grad.append("stop").attr("offset","100%").attr("stop-color","#FDAE61").attr("stop-opacity", 0.02);

  defs.append("clipPath").attr("id","chart-clip")
    .append("rect").attr("width", iW).attr("height", iH);

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  // Filter data to current domain
  const visData = DATA.filter(d => d.year >= domain[0] && d.year <= domain[1]);

  const xScale = d3.scaleLinear().domain(domain).range([0, iW]);
  const yScale = d3.scaleLinear()
    .domain([0, d3.max(visData, d => d.sightings) * 1.14 || 10])
    .range([iH, 0]);

  // Grid
  g.append("g").attr("class","vz-grid")
    .call(d3.axisLeft(yScale).ticks(5).tickSize(-iW).tickFormat(""))
    .call(s => s.select(".domain").remove());

  // Event lines (only those in domain)
  EVENTS
    .filter(ev => ev.year >= domain[0] && ev.year <= domain[1])
    .forEach(ev => {
      g.append("line").attr("class","event-line")
        .attr("x1", xScale(ev.year)).attr("y1", 0)
        .attr("x2", xScale(ev.year)).attr("y2", iH);
    });

  // Area
  const areaGen = d3.area()
    .x(d => xScale(d.year)).y0(iH).y1(d => yScale(d.sightings))
    .curve(d3.curveCatmullRom.alpha(0.5));
  g.append("path").datum(visData)
    .attr("clip-path","url(#chart-clip)")
    .attr("fill","url(#area-grad)").attr("d", areaGen);

  // Line
  const lineGen = d3.line()
    .x(d => xScale(d.year)).y(d => yScale(d.sightings))
    .curve(d3.curveCatmullRom.alpha(0.5));
  g.append("path").datum(visData)
    .attr("clip-path","url(#chart-clip)")
    .attr("class","vz-line").attr("d", lineGen);

  // Axes
  g.append("g").attr("class","vz-axis vz-axis-x")
    .attr("transform",`translate(0,${iH})`)
    .call(d3.axisBottom(xScale).ticks(Math.floor(iW / 85)).tickFormat(d3.format("d")));

  g.append("g").attr("class","vz-axis vz-axis-y")
    .call(d3.axisLeft(yScale).ticks(5));

  // Axis labels
  g.append("text").attr("class","vz-axis-label")
    .attr("x", iW / 2).attr("y", iH + 50)
    .attr("text-anchor","middle").text("Year");

  g.append("text").attr("class","vz-axis-label")
    .attr("transform","rotate(-90)")
    .attr("x", -iH / 2).attr("y", -60)
    .attr("text-anchor","middle").text("Sightings per year");

  // Title + subtitle
  svg.append("text").attr("class","vz-chart-title")
    .attr("x", margin.left).attr("y", 30)
    .attr("text-anchor","start").text("Bigfoot Sightings Over Time");
  svg.append("text").attr("class","vz-subtitle")
    .attr("x", margin.left).attr("y", 50)
    .attr("text-anchor","start")
    .text(`Reported sightings per year (${domain[0]}–${domain[1]})  ·  hover events for context`);

  // ── Hover line & dot ──
  const hoverLine = g.append("line").attr("class","hover-line")
    .attr("y1", 0).attr("y2", iH).attr("opacity", 0);
  const hoverDot = g.append("circle").attr("class","hover-dot")
    .attr("r", 5).attr("opacity", 0);

  const bisect = d3.bisector(d => d.year).center;

  // ─────────────────────────────────────────────
  // ZOOM MODE: add brush, skip hover
  // ─────────────────────────────────────────────
  if (zoomMode) {
    const brush = d3.brushX()
      .extent([[0, 0], [iW, iH]])
      .on("end", function(event) {
        if (!event.selection) { setZoomMode(false); return; }
        const [x0, x1] = event.selection;
        const d0 = xScale.invert(x0);
        const d1 = xScale.invert(x1);
        if (d1 - d0 < 2) { d3.select(this).call(brush.clear); return; }
        zoomDomain = [Math.floor(d0), Math.ceil(d1)];
        zoomMode = false;
        document.body.classList.remove("zoom-mode");
        btnZ.classList.remove("active");
        btnZ.textContent = "[ select to zoom ]";
        btnR.classList.add("visible");
        render();
      });

    const bG = g.append("g").attr("class","brush").call(brush);
    bG.select(".selection").attr("fill","#D7EAF7").attr("fill-opacity",0.12)
      .attr("stroke","#D7EAF7").attr("stroke-width",1);
    return; // skip hover setup in zoom mode
  }

  // ─────────────────────────────────────────────
  // NORMAL MODE: hover interaction
  // ─────────────────────────────────────────────
  svg.append("rect")
    .attr("x", margin.left).attr("y", margin.top)
    .attr("width", iW).attr("height", iH)
    .attr("fill","none").attr("pointer-events","all")
    .on("mousemove", function(event) {
      const [mx] = d3.pointer(event, g.node());
      const yr = xScale.invert(mx);
      const idx = bisect(visData, yr);
      const d = visData[Math.max(0, Math.min(idx, visData.length - 1))];
      if (!d) return;

      const cx = xScale(d.year);
      const cy = yScale(d.sightings);
      hoverLine.attr("x1", cx).attr("x2", cx).attr("opacity", 1);
      hoverDot.attr("cx", cx).attr("cy", cy).attr("opacity", 1);

      // Dot page position (center of the dot)
      const dotPageX = margin.left + cx;
      const dotPageY = margin.top + cy;
      showHoverTip(
        `<span class="tt-meta" style="font-size:13px;font-weight:700;color:#FDAE61">${d.year}</span><br>` +
        `<span class="tt-meta">${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}</span>`,
        dotPageX, dotPageY
      );
    })
    .on("mouseleave", () => {
      hoverLine.attr("opacity", 0);
      hoverDot.attr("opacity", 0);
      if (pinnedYear === null) tip.style.opacity = "0";
    });

  // ── Event dots (on top of hover rect) ──
  const evDotData = EVENTS
    .filter(ev => ev.year >= domain[0] && ev.year <= domain[1])
    .map(ev => {
      const match = visData.find(d => d.year === ev.year);
      return { ...ev, sightings: match ? match.sightings : 0 };
    });

  svg.selectAll(".event-dot")
    .data(evDotData)
    .join("circle")
    .attr("class","event-dot")
    .attr("cx", d => margin.left + xScale(d.year))
    .attr("cy", d => margin.top  + yScale(d.sightings))
    .attr("r", d => pinnedYear === d.year ? 8 : 5)
    .attr("stroke", d => pinnedYear === d.year ? "#FDAE61" : "#D7EAF7")
    .on("mouseover", function(event, d) {
      hoveredYear = d.year;
      syncDotStyles();
      hoverLine.attr("opacity", 0);
      hoverDot.attr("opacity", 0);
      const dotPageX = margin.left + xScale(d.year);
      const dotPageY = margin.top  + yScale(d.sightings);
      showEventHoverTip(d, dotPageX, dotPageY);
    })
    .on("mouseout", function(event, d) {
      hoveredYear = null;
      syncDotStyles();
      hideTip();
    })
    .on("click", function(event, d) {
      event.stopPropagation();
      hoveredYear = null;
      const dotPageX = margin.left + xScale(d.year);
      const dotPageY = margin.top  + yScale(d.sightings);
      if (pinnedYear === d.year) {
        pinnedYear = null;
        tip.style.opacity = "0";
        tip.className = "";
      } else {
        pinnedYear = d.year;
        showPinnedTip(d, dotPageX, dotPageY);
      }
      syncDotStyles();
    });
}

// ─────────────────────────────────────────────
// INIT + RESIZE
// ─────────────────────────────────────────────
render();

let rafId;
window.addEventListener("resize", () => {
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(render);
});
