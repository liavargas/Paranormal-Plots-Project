<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UFO Sightings Over Time</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; overflow: hidden;
      font-family: 'Courier New', Courier, monospace;
      background: #000;
    }
    #chart-wrap { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; }

    /* ── Line & area ── */
    .vz-line  { stroke: #2c7bb6; stroke-width: 2.5; fill: none; }

    /* ── Axes ── */
    .vz-axis text {
      font-size: 15px; font-weight: 700;
      fill: #ffffff; opacity: 1;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-axis .domain    { stroke: #ffffff; opacity: 0.7; }
    .vz-axis .tick line { stroke: #ffffff; opacity: 0.5; }
    .vz-grid line       { stroke: #ffffff; stroke-opacity: 0.07; }
    .vz-grid .domain    { display: none; }

    /* ── Titles / labels ── */
    .vz-chart-title {
      font-size: 20px; font-weight: 700; fill: #2c7bb6;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-subtitle {
      font-size: 13px; fill: #ffffff; opacity: 0.8;
      font-family: 'Courier New', Courier, monospace;
    }
    .vz-axis-label {
      font-size: 16px; font-weight: 700; fill: #ffffff; opacity: 1;
      font-family: 'Courier New', Courier, monospace;
    }

    /* ── Event markers ── */
    .event-line { stroke: #D7EAF7; stroke-width: 1; stroke-dasharray: 4,5; opacity: 0.18; }
    .event-dot  {
      fill: #000; stroke: #D7EAF7; stroke-width: 1.5;
      cursor: pointer; transition: r 0.1s, stroke 0.1s;
    }

    /* ── Hover helpers ── */
    .hover-line { stroke: #D7EAF7; stroke-width: 1; opacity: 0.35; pointer-events: none; }
    .hover-dot  { fill: #2c7bb6; stroke: #000; stroke-width: 2; pointer-events: none; }

    /* ── Brush ── */
    .brush .selection { fill: #D7EAF7; fill-opacity: 0.12; stroke: #D7EAF7; stroke-width: 1; }
    .brush .handle    { fill: #D7EAF7; opacity: 0.5; }
    .brush .overlay   { cursor: crosshair; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(0,0,0,0.95);
      border: 1px solid rgba(215,234,247,0.35);
      color: #D7EAF7;
      padding: 12px 15px;
      border-radius: 3px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 12px; line-height: 1.6;
      width: 300px;
      word-wrap: break-word;
      white-space: normal;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 200;
      pointer-events: none;
    }
    #tooltip.pinned { border-color: rgba(44,123,182,0.6); }
    #tooltip .tt-label { display: block; color: #fff; font-weight: 700; font-size: 13px; margin-bottom: 3px; }
    #tooltip .tt-meta  { color: #2c7bb6; font-size: 12px; }
    #tooltip .tt-hint  { color: #ffffff; opacity: 0.75; font-size: 12px; margin-top: 6px; }
    #tooltip .tt-desc  {
      color: #D7EAF7; font-size: 12px; line-height: 1.7;
      margin-top: 9px; padding-top: 8px;
      border-top: 1px solid rgba(215,234,247,0.2);
      word-wrap: break-word; white-space: normal;
    }
    /* Multi-event entries inside a single tooltip */
    #tooltip .tt-event + .tt-event { margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(215,234,247,0.12); }
    #tooltip .tt-event-label { color: #fff; font-weight: 700; font-size: 12px; display: block; margin-bottom: 2px; }
    #tooltip .tt-event-desc  { color: #D7EAF7; font-size: 11.5px; line-height: 1.65; }

    /* ── Floating UI buttons ── */
    #ui-buttons {
      position: fixed; top: 14px; right: 16px;
      display: flex; gap: 8px; z-index: 300;
    }
    .ui-btn {
      background: rgba(0,0,0,0.85);
      border: 1px solid rgba(215,234,247,0.35);
      color: #D7EAF7;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px; padding: 5px 12px;
      cursor: pointer; border-radius: 2px;
      transition: border-color 0.1s, color 0.1s;
      display: none;
    }
    .ui-btn.visible { display: inline-block; }
    .ui-btn.active  { border-color: #2c7bb6; color: #2c7bb6; }
    .ui-btn:hover   { border-color: #2c7bb6; color: #2c7bb6; }

    body.zoom-mode #chart-wrap { cursor: crosshair; }
  </style>
</head>
<body>
<div id="chart-wrap"></div>
<div id="tooltip"></div>
<div id="ui-buttons">
  <button class="ui-btn visible" id="btn-zoom">[ select to zoom ]</button>
  <button class="ui-btn" id="btn-reset">[ reset zoom ]</button>
</div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let zoomDomain  = null;
let zoomMode    = false;
let pinnedYear  = null;
let hoveredYear = null;

const tip  = document.getElementById("tooltip");
const btnZ = document.getElementById("btn-zoom");
const btnR = document.getElementById("btn-reset");

// Single source of truth for all event dot sizes/colors.
function syncDotStyles() {
  d3.selectAll(".event-dot")
    .attr("r", d => (pinnedYear === d.year || hoveredYear === d.year) ? 8 : 5)
    .attr("stroke", d => pinnedYear === d.year ? "#2c7bb6" :
                          hoveredYear === d.year ? "#2c7bb6" : "#D7EAF7");
}

// ─────────────────────────────────────────────
// TOOLTIP HELPERS
// ─────────────────────────────────────────────
function placeTipAbove(dotPageX, dotPageY) {
  const th  = tip.offsetHeight;
  const tw  = tip.offsetWidth;
  const pad = 14;
  let lx = dotPageX - tw / 2;
  let ty = dotPageY - th - pad;
  lx = Math.max(pad, Math.min(lx, window.innerWidth - tw - pad));
  if (ty < pad) ty = dotPageY + pad + 8;
  tip.style.left = lx + "px";
  tip.style.top  = ty + "px";
}

function showHoverTip(html, dotPageX, dotPageY) {
  if (pinnedYear !== null) return;
  tip.className = "";
  tip.innerHTML = html;
  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

function showPinnedTip(d, dotPageX, dotPageY) {
  pinnedYear = d.year;
  tip.className = "pinned";

  // Build multi-event content if needed
  const eventsHtml = d.events.length === 1
    ? `<div class="tt-desc">${d.events[0].desc}</div>`
    : d.events.map(ev =>
        `<div class="tt-event">
          <span class="tt-event-label">${ev.name}</span>
          <span class="tt-event-desc">${ev.desc}</span>
        </div>`
      ).join("");

  tip.innerHTML =
    `<span class="tt-label">${d.label}</span>` +
    `<span class="tt-meta">${d.year} &nbsp;·&nbsp; ${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}</span>` +
    eventsHtml +
    `<div class="tt-hint">click dot or anywhere to dismiss</div>`;

  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

function showEventHoverTip(d, dotPageX, dotPageY) {
  if (pinnedYear !== null) return;
  const multi = d.events.length > 1 ? ` (${d.events.length} events)` : "";
  tip.className = "";
  tip.innerHTML =
    `<span class="tt-label">${d.label}</span>` +
    `<span class="tt-meta">${d.year} &nbsp;·&nbsp; ${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}${multi}</span>` +
    `<div class="tt-hint">click to read description</div>`;
  tip.style.opacity = "0";
  tip.style.left = "0px"; tip.style.top = "0px";
  requestAnimationFrame(() => { placeTipAbove(dotPageX, dotPageY); tip.style.opacity = "1"; });
}

function hideTip() {
  if (pinnedYear !== null) return;
  tip.style.opacity = "0";
  tip.className = "";
}

function clearPin() {
  pinnedYear = null;
  tip.style.opacity = "0";
  tip.className = "";
  syncDotStyles();
}

document.addEventListener("click", () => {
  if (pinnedYear !== null) clearPin();
});

// ─────────────────────────────────────────────
// ZOOM MODE
// ─────────────────────────────────────────────
function setZoomMode(on) {
  zoomMode = on;
  document.body.classList.toggle("zoom-mode", on);
  btnZ.classList.toggle("active", on);
  btnZ.textContent = on ? "[ cancel zoom ]" : "[ select to zoom ]";
  render();
}

btnZ.addEventListener("click", () => setZoomMode(!zoomMode));
btnR.addEventListener("click", () => {
  zoomDomain = null;
  pinnedYear = null;
  btnR.classList.remove("visible");
  render();
});

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function render() {
  const W = window.innerWidth;
  const H = window.innerHeight;

  d3.select("#chart-wrap").selectAll("svg").remove();
  hideTip();

  const margin = { top: 68, right: 50, bottom: 60, left: 76 };
  const iW = W - margin.left - margin.right;
  const iH = H - margin.top - margin.bottom;

  const domain = zoomDomain || FULL_DOMAIN;

  const svg = d3.select("#chart-wrap").append("svg")
    .attr("width", W).attr("height", H)
    .style("background", "#000");

  // Gradient
  const defs = svg.append("defs");
  const grad = defs.append("linearGradient")
    .attr("id","area-grad").attr("x1","0").attr("y1","0").attr("x2","0").attr("y2","1");
  grad.append("stop").attr("offset","0%").attr("stop-color","#2c7bb6").attr("stop-opacity", 0.42);
  grad.append("stop").attr("offset","100%").attr("stop-color","#2c7bb6").attr("stop-opacity", 0.02);

  defs.append("clipPath").attr("id","chart-clip")
    .append("rect").attr("width", iW).attr("height", iH);

  const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

  const visData = DATA.filter(d => d.year >= domain[0] && d.year <= domain[1]);

  const xScale = d3.scaleLinear().domain(domain).range([0, iW]);
  const yScale = d3.scaleLinear()
    .domain([0, d3.max(visData, d => d.sightings) * 1.14 || 10])
    .range([iH, 0]);

  // Grid
  g.append("g").attr("class","vz-grid")
    .call(d3.axisLeft(yScale).ticks(5).tickSize(-iW).tickFormat(""))
    .call(s => s.select(".domain").remove());

  // Event vertical lines
  EVENTS
    .filter(ev => ev.year >= domain[0] && ev.year <= domain[1])
    .forEach(ev => {
      g.append("line").attr("class","event-line")
        .attr("x1", xScale(ev.year)).attr("y1", 0)
        .attr("x2", xScale(ev.year)).attr("y2", iH);
    });

  // Area
  const areaGen = d3.area()
    .x(d => xScale(d.year)).y0(iH).y1(d => yScale(d.sightings))
    .curve(d3.curveCatmullRom.alpha(0.5));
  g.append("path").datum(visData)
    .attr("clip-path","url(#chart-clip)")
    .attr("fill","url(#area-grad)").attr("d", areaGen);

  // Line
  const lineGen = d3.line()
    .x(d => xScale(d.year)).y(d => yScale(d.sightings))
    .curve(d3.curveCatmullRom.alpha(0.5));
  g.append("path").datum(visData)
    .attr("clip-path","url(#chart-clip)")
    .attr("class","vz-line").attr("d", lineGen);

  // Axes
  // Tick interval: 10 years for full/wide view, 5 years when zoomed tight
  const tickStep   = (domain[1] - domain[0]) > 50 ? 10 : 5;
  const tickStart  = Math.ceil(domain[0] / tickStep) * tickStep;
  const tickValues = d3.range(tickStart, domain[1] + 1, tickStep);

  g.append("g").attr("class","vz-axis vz-axis-x")
    .attr("transform",`translate(0,${iH})`)
    .call(d3.axisBottom(xScale).tickValues(tickValues).tickFormat(d3.format("d")));

  g.append("g").attr("class","vz-axis vz-axis-y")
    .call(d3.axisLeft(yScale).ticks(5));

  // Axis labels
  g.append("text").attr("class","vz-axis-label")
    .attr("x", iW / 2).attr("y", iH + 50)
    .attr("text-anchor","middle").text("Year");

  g.append("text").attr("class","vz-axis-label")
    .attr("transform","rotate(-90)")
    .attr("x", -iH / 2).attr("y", -60)
    .attr("text-anchor","middle").text("Sightings per year");

  // Title + subtitle
  svg.append("text").attr("class","vz-chart-title")
    .attr("x", margin.left).attr("y", 30)
    .attr("text-anchor","start").text("UFO Sightings Over Time");
  svg.append("text").attr("class","vz-subtitle")
    .attr("x", margin.left).attr("y", 50)
    .attr("text-anchor","start")
    .text(`Reported sightings per year (${domain[0]}–${domain[1]})  ·  hover events for context`);

  // ── Hover line & dot ──
  const hoverLine = g.append("line").attr("class","hover-line")
    .attr("y1", 0).attr("y2", iH).attr("opacity", 0);
  const hoverDot = g.append("circle").attr("class","hover-dot")
    .attr("r", 5).attr("opacity", 0);

  const bisect = d3.bisector(d => d.year).center;

  // ── ZOOM MODE ──
  if (zoomMode) {
    const brush = d3.brushX()
      .extent([[0, 0], [iW, iH]])
      .on("end", function(event) {
        if (!event.selection) { setZoomMode(false); return; }
        const [x0, x1] = event.selection;
        const d0 = xScale.invert(x0);
        const d1 = xScale.invert(x1);
        if (d1 - d0 < 2) { d3.select(this).call(brush.clear); return; }
        zoomDomain = [Math.floor(d0), Math.ceil(d1)];
        zoomMode = false;
        document.body.classList.remove("zoom-mode");
        btnZ.classList.remove("active");
        btnZ.textContent = "[ select to zoom ]";
        btnR.classList.add("visible");
        render();
      });
    const bG = g.append("g").attr("class","brush").call(brush);
    bG.select(".selection").attr("fill","#D7EAF7").attr("fill-opacity",0.12)
      .attr("stroke","#D7EAF7").attr("stroke-width",1);
    return;
  }

  // ── NORMAL MODE: hover interaction ──
  svg.append("rect")
    .attr("x", margin.left).attr("y", margin.top)
    .attr("width", iW).attr("height", iH)
    .attr("fill","none").attr("pointer-events","all")
    .on("mousemove", function(event) {
      const [mx] = d3.pointer(event, g.node());
      const yr = xScale.invert(mx);
      const idx = bisect(visData, yr);
      const d = visData[Math.max(0, Math.min(idx, visData.length - 1))];
      if (!d) return;
      const cx = xScale(d.year), cy = yScale(d.sightings);
      hoverLine.attr("x1", cx).attr("x2", cx).attr("opacity", 1);
      hoverDot.attr("cx", cx).attr("cy", cy).attr("opacity", 1);
      const dotPageX = margin.left + cx, dotPageY = margin.top + cy;
      showHoverTip(
        `<span class="tt-meta" style="font-size:13px;font-weight:700;color:#2c7bb6">${d.year}</span><br>` +
        `<span class="tt-meta">${d.sightings} sighting${d.sightings !== 1 ? "s" : ""}</span>`,
        dotPageX, dotPageY
      );
    })
    .on("mouseleave", () => {
      hoverLine.attr("opacity", 0);
      hoverDot.attr("opacity", 0);
      if (pinnedYear === null) tip.style.opacity = "0";
    });

  // ── Event dots ──
  const evDotData = EVENTS
    .filter(ev => ev.year >= domain[0] && ev.year <= domain[1])
    .map(ev => {
      const match = visData.find(d => d.year === ev.year);
      return { ...ev, sightings: match ? match.sightings : 0 };
    });

  svg.selectAll(".event-dot")
    .data(evDotData)
    .join("circle")
    .attr("class","event-dot")
    .attr("cx", d => margin.left + xScale(d.year))
    .attr("cy", d => margin.top  + yScale(d.sightings))
    .attr("r", d => pinnedYear === d.year ? 8 : 5)
    .attr("stroke", d => pinnedYear === d.year ? "#2c7bb6" : "#D7EAF7")
    .on("mouseover", function(event, d) {
      hoveredYear = d.year;
      syncDotStyles();
      hoverLine.attr("opacity", 0);
      hoverDot.attr("opacity", 0);
      const dotPageX = margin.left + xScale(d.year);
      const dotPageY = margin.top  + yScale(d.sightings);
      showEventHoverTip(d, dotPageX, dotPageY);
    })
    .on("mouseout", function() {
      hoveredYear = null;
      syncDotStyles();
      hideTip();
    })
    .on("click", function(event, d) {
      event.stopPropagation();
      hoveredYear = null;
      const dotPageX = margin.left + xScale(d.year);
      const dotPageY = margin.top  + yScale(d.sightings);
      if (pinnedYear === d.year) {
        pinnedYear = null;
        tip.style.opacity = "0";
        tip.className = "";
      } else {
        pinnedYear = d.year;
        showPinnedTip(d, dotPageX, dotPageY);
      }
      syncDotStyles();
    });
}

// ─────────────────────────────────────────────
// INIT + RESIZE
// ─────────────────────────────────────────────
render();

let rafId;
window.addEventListener("resize", () => {
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(render);
});
</script>
</body>
</html>
