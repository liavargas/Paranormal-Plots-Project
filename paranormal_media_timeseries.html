    *, *::before, *::after { box-sizing: border-box; }

      overflow: hidden;

      letter-spacing: 0.14em;
      color: #ffffff;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    /* Filter buttons */
    .filter-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 2px;
      color: #ffffff;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      padding: 7px 10px;
      cursor: pointer;
      margin-bottom: 5px;
      transition: color 0.12s, border-color 0.12s;
    }
    .filter-btn:hover  { color: #D7EAF7; border-color: rgba(215,234,247,0.22); }
    .filter-btn.act-both { color: #D7EAF7; border-color: rgba(215,234,247,0.32); }
    .filter-btn.act-ufo  { color: #2c7bb6; border-color: rgba(44,123,182,0.55); }
    .filter-btn.act-bf   { color: #FDAE61; border-color: rgba(253,174,97,0.55); }

    /* Series legend */
    .legend-row {
      display: flex; align-items: center; gap: 9px;
      color: #ffffff;
      font-size: 12px;
      margin-bottom: 8px;
    }
    .leg-swatch { width: 24px; height: 3px; border-radius: 2px; flex-shrink: 0; }

    /* ── Axes / grid ── */
    .vz-axis text {
      font-size: 14px; font-weight: 700;
      fill: #ffffff; opacity: 1;
      font-family: 'Courier New', monospace;
    }
    .vz-axis .domain { display: none; }
    .vz-axis .tick line { stroke: rgba(215,234,247,0.25); }
    .vz-grid line { stroke: rgba(215,234,247,0.07); }
    .vz-grid .domain { display: none; }
    .axis-ufo text { fill: #2c7bb6 !important; opacity: 0.9 !important; }
    .axis-bf  text { fill: #FDAE61 !important; opacity: 0.9 !important; }
    .axis-ufo .tick line { stroke: rgba(44,123,182,0.3) !important; }
    .axis-bf  .tick line { stroke: rgba(253,174,97,0.3) !important; }

    /* ── Brush ── */
    .brush .selection { fill: #D7EAF7; fill-opacity: 0.11; stroke: #D7EAF7; stroke-width: 1; }
    .brush .handle    { fill: #D7EAF7; opacity: 0.45; }
    .brush .overlay   { cursor: crosshair; }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      background: rgba(4,4,4,0.97);
      border: 1px solid rgba(215,234,247,0.28);
      color: #D7EAF7;
      padding: 12px 14px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 12px; line-height: 1.6;
      width: 290px;
      opacity: 0;
      transition: opacity 0.12s;
      z-index: 300;
      pointer-events: none;
      word-wrap: break-word;
    }
    #tooltip.pinned-ufo { border-color: rgba(44,123,182,0.6); }
    #tooltip.pinned-bf  { border-color: rgba(253,174,97,0.6); }
    .tt-title { font-size: 13.5px; font-weight: 700; color: #fff; display: block; margin-bottom: 3px; }
    .tt-year  { font-size: 11px; display: inline; }
    .tt-year-ufo { color: #2c7bb6; }
    .tt-year-bf  { color: #FDAE61; }
    .tt-stars { color: #f0c040; font-size: 12px; }
    .tt-votes { color: rgba(215,234,247,0.5); font-size: 11px; }
    .tt-hint  { font-size: 10.5px; color: rgba(215,234,247,0.38); margin-top: 7px; display: block; }
    .tt-desc  {
      font-size: 11px; line-height: 1.75;
      margin-top: 10px; padding-top: 9px;
      border-top: 1px solid rgba(215,234,247,0.13);
      color: rgba(215,234,247,0.88);
    }

    /* ── Floating UI buttons ── */
    #ui-buttons {
      position: fixed;
      top: 14px; right: 236px;
      display: flex; gap: 8px;

      background: rgba(0,0,0,0.85);

function setFilter(f) {
  filter = f;
  ['both','ufo','bf'].forEach(id => {
    const btn = document.getElementById('btn-' + id);
    btn.className = 'filter-btn' + (f === id ? ' act-' + id : '');
  });
  pinnedMedia = null;
  tip.style.opacity = '0';
  tip.className = '';
  render();
}

// ═══════════════════════════════════════════════════
// ZOOM MODE
// ═══════════════════════════════════════════════════

function setZoomMode(on) {
  zoomMode = on;
  document.body.classList.toggle("zoom-mode", on);
  btnZ.classList.toggle("active", on);
  btnZ.textContent = on ? "[ cancel zoom ]" : "[ select to zoom ]";
  render();
}

btnZ.addEventListener("click", () => setZoomMode(!zoomMode));
btnR.addEventListener("click", () => {
  xDomain = [FULL_YEAR_MIN, FULL_YEAR_MAX];
  btnR.classList.remove("visible");
  render();
});

// ═══════════════════════════════════════════════════
// TOOLTIP HELPERS
// ═══════════════════════════════════════════════════

function starsHtml(r) {
  const full = Math.floor(r);
  const half = r - full >= 0.5 ? 1 : 0;
  return '★'.repeat(full) + (half ? '½' : '');
}

function fmtVotes(v) {
  if (v >= 1000000) return (v/1000000).toFixed(1) + 'M';
  if (v >= 1000)    return Math.round(v/1000) + 'K';
  return v;
}

function placeTip(dotX, dotY) {
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  const pad = 14;
  let lx = dotX - tw/2;
  let ty = dotY - th - pad;
  lx = Math.max(pad, Math.min(lx, window.innerWidth - tw - pad));
  if (ty < pad) ty = dotY + pad + 6;
  tip.style.left = lx + 'px';
  tip.style.top  = ty + 'px';
}

function showHoverTip(item, kind, dotX, dotY) {
  if (pinnedMedia !== null) return;
  const cls = kind === 'ufo' ? 'tt-year-ufo' : 'tt-year-bf';
  tip.className = '';
  tip.innerHTML =
    `<span class="tt-title">${item.title}</span>` +
    `<span class="tt-year ${cls}">${item.year}</span>  ` +
    `<span class="tt-stars">${starsHtml(item.rating)}</span> ` +
    `<span class="tt-votes">${item.rating.toFixed(1)} · ${fmtVotes(item.votes)} ratings</span>` +
    `<span class="tt-hint">click to read description</span>`;
  tip.style.opacity = '0';
  requestAnimationFrame(() => { placeTip(dotX, dotY); tip.style.opacity = '1'; });
}

function showPinnedTip(item, kind, dotX, dotY) {
  pinnedMedia = { item, kind };
  const cls = kind === 'ufo' ? 'tt-year-ufo' : 'tt-year-bf';
  tip.className = 'pinned-' + kind;
  tip.innerHTML =
    `<span class="tt-title">${item.title}</span>` +
    `<span class="tt-year ${cls}">${item.year}</span>  ` +
    `<span class="tt-stars">${starsHtml(item.rating)}</span> ` +
    `<span class="tt-votes">${item.rating.toFixed(1)} · ${fmtVotes(item.votes)} ratings</span>` +
    `<div class="tt-desc">${item.desc}</div>` +
    `<span class="tt-hint">click anywhere to dismiss</span>`;
  tip.style.opacity = '0';
  requestAnimationFrame(() => { placeTip(dotX, dotY); tip.style.opacity = '1'; });
}

function clearPin() {
  pinnedMedia = null;
  tip.style.opacity = '0';
  tip.className = '';
  syncDots();
}

document.addEventListener('click', () => { if (pinnedMedia) clearPin(); });

// ═══════════════════════════════════════════════════
// DOT RADIUS SCALE
// ═══════════════════════════════════════════════════

const rScale = d3.scaleSqrt().domain([0, 700000]).range([3.5, 16]).clamp(true);
function dotR(votes) { return Math.max(3.5, rScale(votes)); }

// ═══════════════════════════════════════════════════
// SYNC DOT STYLES
// ═══════════════════════════════════════════════════

function syncDots() {
  d3.selectAll('.media-dot')
    .attr('opacity', d => {
      if (pinnedMedia && pinnedMedia.item === d.item) return 1;
      if (hoveredMedia && hoveredMedia === d.item) return 1;
      return 0.78;
    })
    .attr('stroke-width', d => {
      if (pinnedMedia && pinnedMedia.item === d.item) return 2.5;
      if (hoveredMedia && hoveredMedia === d.item) return 2;
      return 1.5;
    });
}

// ═══════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════

const MARGIN_L  = 78;
const MARGIN_R  = 78;
const MARGIN_T  = 78;
const MARGIN_B  = 65;

function render() {
  const W = document.getElementById('chart-wrap').clientWidth;
  const H = window.innerHeight;

  d3.select('#chart-wrap').selectAll('svg').remove();

  const iW = W - MARGIN_L - MARGIN_R;
  const iH = H - MARGIN_T - MARGIN_B;

  const xMin = xDomain[0], xMax = xDomain[1];

  const visUFO = UFO_DATA.filter(d => d.y >= xMin && d.y <= xMax);
  const visBF  = BF_DATA.filter(d => d.y >= xMin && d.y <= xMax);

  const xScale    = d3.scaleLinear().domain([xMin, xMax]).range([0, iW]);
  const ufoYScale = d3.scaleLinear()
    .domain([0, d3.max(UFO_DATA, d => d.n) * 1.12])
    .range([iH, 0]);
  const bfYScale  = d3.scaleLinear()
    .domain([0, d3.max(BF_DATA, d => d.n) * 1.12])
    .range([iH, 0]);

  const svg = d3.select('#chart-wrap').append('svg')
    .attr('width', W).attr('height', H)
    .style('background', '#000');

  const defs = svg.append('defs');

  ['ufo','bf'].forEach(k => {
    const col = k === 'ufo' ? '#2c7bb6' : '#FDAE61';
    const gr = defs.append('linearGradient')
      .attr('id', `grad-${k}`)
      .attr('x1','0').attr('y1','0').attr('x2','0').attr('y2','1');
    gr.append('stop').attr('offset','0%').attr('stop-color', col).attr('stop-opacity', 0.30);
    gr.append('stop').attr('offset','100%').attr('stop-color', col).attr('stop-opacity', 0.01);
  });

  defs.append('clipPath').attr('id','chart-clip')
    .append('rect').attr('width', iW).attr('height', iH);

  const g = svg.append('g').attr('transform', `translate(${MARGIN_L},${MARGIN_T})`);

  // Grid
  g.append('g').attr('class','vz-grid')
    .call(d3.axisLeft(ufoYScale).ticks(5).tickSize(-iW).tickFormat(''))
    .call(s => s.select('.domain').remove());

  // Lines + areas
  const lineGen = (yS) => d3.line().x(d => xScale(d.y)).y(d => yS(d.n)).curve(d3.curveCatmullRom.alpha(0.5));
  const areaGen = (yS) => d3.area().x(d => xScale(d.y)).y0(iH).y1(d => yS(d.n)).curve(d3.curveCatmullRom.alpha(0.5));

  if (filter !== 'bf') {
    g.append('path').datum(visUFO)
      .attr('clip-path','url(#chart-clip)')
      .attr('fill','url(#grad-ufo)').attr('d', areaGen(ufoYScale));
    g.append('path').datum(visUFO)
      .attr('clip-path','url(#chart-clip)')
      .attr('fill','none').attr('stroke','#2c7bb6').attr('stroke-width', 2.2)
      .attr('d', lineGen(ufoYScale));
  }
  if (filter !== 'ufo') {
    g.append('path').datum(visBF)
      .attr('clip-path','url(#chart-clip)')
      .attr('fill','url(#grad-bf)').attr('d', areaGen(bfYScale));
    g.append('path').datum(visBF)
      .attr('clip-path','url(#chart-clip)')
      .attr('fill','none').attr('stroke','#FDAE61').attr('stroke-width', 2.2)
      .attr('d', lineGen(bfYScale));
  }

  // Axes
  const tickStep   = (xMax - xMin) > 50 ? 10 : 5;
  const tickStart  = Math.ceil(xMin / tickStep) * tickStep;
  const tickValues = d3.range(tickStart, xMax + 1, tickStep);

  g.append('g').attr('class','vz-axis')
    .attr('transform', `translate(0,${iH})`)
    .call(d3.axisBottom(xScale).tickValues(tickValues).tickFormat(d3.format('d')));

  if (filter !== 'bf') {
    g.append('g').attr('class','vz-axis axis-ufo')
      .attr('transform', `translate(${iW},0)`)
      .call(d3.axisRight(ufoYScale).ticks(5).tickFormat(d => d >= 1000 ? (d/1000)+'K' : d));
  }
  if (filter !== 'ufo') {
    g.append('g').attr('class','vz-axis axis-bf')
      .call(d3.axisLeft(bfYScale).ticks(5));
  }

  // Axis labels
  if (filter !== 'bf') {
    g.append('text')
      .attr('transform', `translate(${iW + 64}, ${iH/2}) rotate(90)`)
      .attr('text-anchor','middle')
      .attr('font-size','15px').attr('font-weight','700')
      .attr('fill','#2c7bb6').attr('opacity', 0.9)
      .attr('font-family','Courier New, monospace')
      .text('UFO sightings / yr');
  }
  if (filter !== 'ufo') {
    g.append('text')
      .attr('transform', `translate(-64, ${iH/2}) rotate(-90)`)
      .attr('text-anchor','middle')
      .attr('font-size','15px').attr('font-weight','700')
      .attr('fill','#FDAE61').attr('opacity', 0.9)
      .attr('font-family','Courier New, monospace')
      .text('Bigfoot sightings / yr');
  }

  // X-axis label
  g.append('text')
    .attr('x', iW / 2).attr('y', iH + 52)
    .attr('text-anchor','middle')
    .attr('font-size','15px').attr('font-weight','700')
    .attr('fill','#ffffff')
    .attr('font-family','Courier New, monospace')
    .text('Year');

  // Title + subtitle
  svg.append('text')
    .attr('x', MARGIN_L).attr('y', 30)
    .attr('font-size','20px').attr('font-weight','700')
    .attr('fill','#D7EAF7').attr('font-family','Courier New, monospace')
    .text('UFO and Bigfoot media and sighting count over time');

  svg.append('text')
    .attr('x', MARGIN_L).attr('y', 56)
    .attr('font-size','14px').attr('fill','#ffffff')
    .attr('font-family','Courier New, monospace')
    .text('Annual sighting reports annotated with notable media releases  |  hover marks for details, click to read');

  // ── ZOOM MODE: brush ──
  if (zoomMode) {
    const brush = d3.brushX()
      .extent([[0, 0], [iW, iH]])
      .on("end", function(event) {
        if (!event.selection) { setZoomMode(false); return; }
        const [x0, x1] = event.selection;
        const d0 = xScale.invert(x0);
        const d1 = xScale.invert(x1);
        if (d1 - d0 < 2) { d3.select(this).call(brush.clear); return; }
        xDomain = [Math.floor(d0), Math.ceil(d1)];
        zoomMode = false;
        document.body.classList.remove("zoom-mode");
        btnZ.classList.remove("active");
        btnZ.textContent = "[ select to zoom ]";
        btnR.classList.add("visible");
        render();
      });
    const bG = g.append("g").attr("class","brush").call(brush);
    bG.select(".selection").attr("fill","#D7EAF7").attr("fill-opacity",0.12)
      .attr("stroke","#D7EAF7").attr("stroke-width",1);
    return;
  }

  // ── Hover crosshair elements (below media dots) ──
  const hoverLine = g.append('line')
    .attr('stroke', '#D7EAF7').attr('stroke-width', 1).attr('opacity', 0)
    .attr('y1', 0).attr('y2', iH).attr('pointer-events', 'none');

  const hoverDotUFO = (filter !== 'bf')
    ? g.append('circle').attr('r', 5)
        .attr('fill', '#2c7bb6').attr('stroke', '#000').attr('stroke-width', 2)
        .attr('pointer-events', 'none').attr('opacity', 0)
    : null;

  const hoverDotBF = (filter !== 'ufo')
    ? g.append('circle').attr('r', 5)
        .attr('fill', '#FDAE61').attr('stroke', '#000').attr('stroke-width', 2)
        .attr('pointer-events', 'none').attr('opacity', 0)
    : null;

  const bisect = d3.bisector(d => d.y).center;

  // ── Media annotation dots data ──
  let dotData = [];
  if (filter !== 'bf') {
    UFO_MEDIA.forEach(m => {
      const sightings = ufoByYear[m.year] ?? 0;
      if (m.year >= xMin && m.year <= xMax)
        dotData.push({ item: m, kind: 'ufo', y: ufoYScale(sightings), x: xScale(m.year) });
    });
  }
  if (filter !== 'ufo') {
    BF_MEDIA.forEach(m => {
      const sightings = bfByYear[m.year] ?? 0;
      if (m.year >= xMin && m.year <= xMax)
        dotData.push({ item: m, kind: 'bf', y: bfYScale(sightings), x: xScale(m.year) });
    });
  }

  // Drop lines
  g.selectAll('.media-drop')
    .data(dotData)
    .join('line')
    .attr('class','media-drop')
    .attr('x1', d => d.x).attr('x2', d => d.x)
    .attr('y1', d => d.y).attr('y2', iH)
    .attr('stroke', d => d.kind === 'ufo' ? '#2c7bb6' : '#FDAE61')
    .attr('stroke-width', 0.8)
    .attr('stroke-dasharray','3,4')
    .attr('opacity', 0.22)
    .attr('clip-path','url(#chart-clip)');

  // ── Mouse overlay (sits above chart, below media dots in SVG order) ──
  svg.append('rect')
    .attr('x', MARGIN_L).attr('y', MARGIN_T)
    .attr('width', iW).attr('height', iH)
    .attr('fill', 'none').attr('pointer-events', 'all')
    .on('mousemove', function(event) {
      if (hoveredMedia || pinnedMedia) return; // media dot takes priority

      const [mx] = d3.pointer(event, g.node());
      const yr = xScale.invert(mx);

      // Snap to nearest year in the active reference series
      const refData = filter !== 'bf' ? visUFO : visBF;
      const idx = bisect(refData, yr);
      const ref = refData[Math.max(0, Math.min(idx, refData.length - 1))];
      if (!ref) return;
      const nearestYear = ref.y;

      const cx = xScale(nearestYear);
      hoverLine.attr('x1', cx).attr('x2', cx).attr('opacity', 0.35);

      const ufoPoint = visUFO.find(d => d.y === nearestYear);
      const bfPoint  = visBF.find(d => d.y === nearestYear);

      if (hoverDotUFO && ufoPoint) {
        hoverDotUFO.attr('cx', cx).attr('cy', ufoYScale(ufoPoint.n)).attr('opacity', 1);
      }
      if (hoverDotBF && bfPoint) {
        hoverDotBF.attr('cx', cx).attr('cy', bfYScale(bfPoint.n)).attr('opacity', 1);
      }

      // Build tooltip
      let html = `<span style="font-size:14px;font-weight:700;color:#fff;display:block;margin-bottom:6px;">${nearestYear}</span>`;
      if (filter !== 'bf') {
        const n = ufoPoint ? ufoPoint.n : 0;
        html += `<span style="color:#2c7bb6;font-size:12px;">UFO: ${n.toLocaleString()} sighting${n !== 1 ? 's' : ''}</span><br>`;
      }
      if (filter !== 'ufo') {
        const n = bfPoint ? bfPoint.n : 0;
        html += `<span style="color:#FDAE61;font-size:12px;">Bigfoot: ${n.toLocaleString()} sighting${n !== 1 ? 's' : ''}</span>`;
      }

      tip.className = '';
      tip.innerHTML = html;
      tip.style.opacity = '0';
      requestAnimationFrame(() => { placeTip(event.clientX, event.clientY - 12); tip.style.opacity = '1'; });
    })
    .on('mouseleave', function() {
      hoverLine.attr('opacity', 0);
      if (hoverDotUFO) hoverDotUFO.attr('opacity', 0);
      if (hoverDotBF) hoverDotBF.attr('opacity', 0);
      if (!pinnedMedia) { tip.style.opacity = '0'; tip.className = ''; }
    });

  // ── Media dots (topmost — drawn last so they sit above overlay) ──
  svg.selectAll('.media-dot')
    .data(dotData)
    .join('circle')
    .attr('class','media-dot')
    .attr('cx', d => MARGIN_L + d.x)
    .attr('cy', d => MARGIN_T + d.y)
    .attr('r',  d => dotR(d.item.votes))
    .attr('fill',   d => d.kind === 'ufo' ? '#2c7bb6' : '#FDAE61')
    .attr('stroke', d => d.kind === 'ufo' ? '#7ab8e0' : '#ffe0b0')
    .attr('stroke-width', 1.5)
    .attr('opacity', 0.82)
    .on('mouseover', function(event, d) {
      hoveredMedia = d.item;
      syncDots();
      // Hide sighting crosshair when over a media dot
      hoverLine.attr('opacity', 0);
      if (hoverDotUFO) hoverDotUFO.attr('opacity', 0);
      if (hoverDotBF) hoverDotBF.attr('opacity', 0);
      showHoverTip(d.item, d.kind, MARGIN_L + d.x, MARGIN_T + d.y);
    })
    .on('mouseout', function() {
      hoveredMedia = null;
      syncDots();
      if (!pinnedMedia) { tip.style.opacity = '0'; tip.className = ''; }
    })
    .on('click', function(event, d) {
      event.stopPropagation();
      if (pinnedMedia && pinnedMedia.item === d.item) {
        clearPin();
      } else {
        pinnedMedia = null;
        showPinnedTip(d.item, d.kind, MARGIN_L + d.x, MARGIN_T + d.y);
      }
      syncDots();
    });
}

// ═══════════════════════════════════════════════════
// SIZE LEGEND  (right panel SVG)
// ═══════════════════════════════════════════════════

function buildSizeLegend() {
  const svg = d3.select('#size-legend');
  const entries = [
    { votes: 15000,  label: '15K ratings' },
    { votes: 100000, label: '100K ratings' },
    { votes: 400000, label: '400K ratings' },
    { votes: 650000, label: '650K ratings' },
  ];
  let cy = 10;
  entries.forEach(e => {
    const r = dotR(e.votes);
    svg.append('circle')
      .attr('cx', 20).attr('cy', cy + r)
      .attr('r', r)
      .attr('fill','rgba(215,234,247,0.18)')
      .attr('stroke','rgba(215,234,247,0.5)')
      .attr('stroke-width', 1.2);
    svg.append('text')
      .attr('x', 42).attr('y', cy + r + 4.5)
      .attr('font-size','11px').attr('fill','#ffffff')
      .attr('font-family','Courier New, monospace')
      .text(e.label);
    cy += r * 2 + 8;
  });
  svg.attr('height', cy + 4);
}

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

render();
buildSizeLegend();

let rafId;
window.addEventListener('resize', () => {
  cancelAnimationFrame(rafId);
  rafId = requestAnimationFrame(render);
});

</script>
</body>
</html>
